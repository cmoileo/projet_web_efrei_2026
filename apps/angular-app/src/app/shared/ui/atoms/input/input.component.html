<span class="lah-input" [class.lah-input--has-icon]="!!prefixIcon()" [class.lah-input--has-suffix]="!!suffixIcon()">
  <!-- Icône préfixe -->
  @if (prefixIcon()) {
    <span class="lah-input__icon" aria-hidden="true">
      <lucide-angular [img]="prefixIcon()!" [size]="16" />
    </span>
  }

  <input
    #inputEl
    class="lah-input__field"
    [id]="inputId() ?? undefined"
    [type]="type()"
    [placeholder]="placeholder()"
    [disabled]="isDisabled() || disabled()"
    [value]="internalValue()"
    [attr.autocomplete]="autocomplete()"
    (input)="onInput($event)"
    (blur)="onBlur()"
  />

  @if (suffixIcon()) {
    <button
      type="button"
      class="lah-input__suffix"
      (click)="suffixClick.emit()"
      [disabled]="isDisabled() || disabled()"
      [attr.aria-label]="suffixAriaLabel()"
      tabindex="0"
    >
      <lucide-angular [img]="suffixIcon()!" [size]="18" aria-hidden="true" />
    </button>
  }
</span>
