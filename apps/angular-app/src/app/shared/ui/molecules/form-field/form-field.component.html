<div class="lah-form-field">
  <!-- Label -->
  @if (label()) {
    <label class="lah-form-field__label">
      {{ label() }}
      @if (required()) {
        <span class="lah-form-field__required" aria-hidden="true"> *</span>
      }
    </label>
  }

  <!-- Input projeté par content projection -->
  <div class="lah-form-field__control" [class.lah-form-field__control--error]="!!error()">
    <ng-content />
  </div>

  <!-- Message d'erreur ou hint -->
  <div class="lah-form-field__messages" aria-live="polite">
    @if (error()) {
      <span class="lah-form-field__error" role="alert">{{ error() }}</span>
    } @else if (hint()) {
      <span class="lah-form-field__hint">{{ hint() }}</span>
    }
  </div>
</div>
