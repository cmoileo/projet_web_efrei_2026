<div class="auth-page">
  <div class="auth-card">
    <header class="auth-card__header">
      <h1 class="auth-card__title">Connexion</h1>
      <p class="auth-card__subtitle">Bienvenue sur Learn&#64;Home</p>
    </header>

    @if (firebaseError()) {
      <div class="auth-error-banner" role="alert">
        <lucide-angular [img]="AlertCircleIcon" [size]="18" aria-hidden="true" />
        <span>{{ firebaseError() }}</span>
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="auth-form">
      <app-form-field label="Adresse e-mail" [error]="getEmailError()">
        <app-input
          type="email"
          placeholder="exemple@email.com"
          [prefixIcon]="MailIcon"
          autocomplete="email"
          formControlName="email"
        />
      </app-form-field>

      <app-form-field label="Mot de passe" [error]="getPasswordError()">
        <app-input
          [type]="passwordVisible() ? 'text' : 'password'"
          [prefixIcon]="LockIcon"
          [suffixIcon]="passwordVisible() ? EyeOffIcon : EyeIcon"
          [suffixAriaLabel]="passwordVisible() ? 'Masquer le mot de passe' : 'Afficher le mot de passe'"
          (suffixClick)="togglePasswordVisibility()"
          autocomplete="current-password"
          formControlName="password"
        />
      </app-form-field>

      <div class="auth-form__forgot">
        <a routerLink="/auth/forgot-password" class="auth-link">Mot de passe oublié ?</a>
      </div>

      <app-btn
        type="submit"
        variant="primary"
        size="lg"
        [loading]="isLoading()"
        [disabled]="isLoading()"
        class="auth-form__submit"
      >
        Se connecter
      </app-btn>
    </form>

    <footer class="auth-card__footer">
      <span class="auth-card__footer-text">Pas encore de compte ?</span>
      <a routerLink="/auth/register" class="auth-link auth-link--bold">S'inscrire</a>
    </footer>
  </div>
</div>
